<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Productivity App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <div class="big-plus" aria-hidden="true">+</div>
    <h1>My Tasks</h1>

    <div class="task-input">
      <input type="text" id="taskInput" placeholder="Enter task" autocomplete="off">
      <button id="addTaskBtn" type="button">Add</button>
    </div>

    <ul id="taskList" aria-live="polite"></ul>
  </main>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
