<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b57d0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tasks">
  <title>My Productivity App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <div class="big-plus" aria-hidden="true">+</div>
    <h1>My Tasks</h1>

    <form class="task-input" id="taskForm">
      <input type="text" id="taskInput" placeholder="Enter task" autocomplete="off" required>
      <input type="date" id="dueDateInput" required>
      <select id="importanceInput" required>
        <option value="high">High</option>
        <option value="mid" selected>Mid</option>
        <option value="low">Low</option>
      </select>
      <button id="addTaskBtn" type="submit">Add</button>
    </form>

    <ul id="taskList" aria-live="polite"></ul>
  </main>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
